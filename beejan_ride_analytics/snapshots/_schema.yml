version: 2

snapshots:
  - name: drivers_snapshot
    description: "SCD Type 2 snapshot tracking historical changes to driver records. Captures changes to driver_status, vehicle_id, and rating over time. Used to build dim_drivers_history for point-in-time analysis."
    columns:
      - name: driver_id
        description: "Natural key. Unique identifier for the driver."

      - name: city_id
        description: "Foreign key to stg_cities. City the driver is operating in."

      - name: vehicle_id
        description: "Vehicle assigned to the driver at this point in time."

      - name: driver_status
        description: "Driver's operational status at this point in time. Expected values: active, inactive, suspended."

      - name: rating
        description: "Driver's rating score at this point in time."

      - name: created_at
        description: "Timestamp when the driver record was first created. Stored in UTC."

      - name: updated_at
        description: "Timestamp of the most recent update to the driver record. Stored in UTC."

      - name: onboarding_date
        description: "Timestamp when the driver was onboarded onto the platform. Stored in UTC."

      # dbt-generated SCD columns
      - name: dbt_scd_id
        description: "Surrogate key generated by dbt. Unique identifier for each snapshot row version."

      - name: dbt_updated_at
        description: "Timestamp when dbt last processed this row."

      - name: dbt_valid_from
        description: "Timestamp from which this version of the driver record became valid."

      - name: dbt_valid_to
        description: "Timestamp at which this version of the driver record was superseded. NULL if this is the current active record."

      - name: dbt_is_deleted
        description: "True if the driver record was hard-deleted from the source system. Populated when invalidate_hard_deletes is enabled."