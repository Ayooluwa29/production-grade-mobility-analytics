version: 2

sources:
  - name: raw
    description: "Raw ingestion layer for beejan ride analytics."
    database: beaming-courage-426914-b2
    schema: raw

    freshness:
      warn_after: {count: 1, period: hour}
      error_after: {count: 3, period: hour}
      filter: "_airbyte_extracted_at >= timestamp_sub(current_timestamp(), interval 1 day)"
      
    loaded_at_field: _airbyte_extracted_at

    tables:
      - name: cities_raw
        description: "Raw city data synced via Airbyte."
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: city_id
            data_type: int64
            description: "Raw identifier for the city as generated by the backend production database. Used as the unique key for city-level data."
            tests:
              - unique
              - not_null
          
          - name: country
            data_type: string
            description: "The raw country string provided by the source system."
            tests:
              - not_null
          
          - name: city_name
            data_type: string
            description: "The raw string for the city's name (e.g., 'London'). This is the value captured at the time of record creation."
            tests:
              - not_null
          
          - name: launch_date
            data_type: date
            description: "The raw date record indicating when the city was added to the source system."
            tests:
              - not_null

      - name: driver_status_events_raw
        description: "Raw driver status event data synced via Airbyte."
        config:
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 2, period: hour}
            filter: "_airbyte_extracted_at >= timestamp_sub(current_timestamp(), interval 1 day)"
          loaded_at_field: _airbyte_extracted_at
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: status
            data_type: string
            description: "The new state the driver transitioned into (e.g., 'online', 'on_trip', 'offline')."
            tests:
              - not_null
          
          - name: event_id
            data_type: int64
            description: "The primary key for the specific status change event in the source database."
            tests:
              - unique
              - not_null
          
          - name: driver_id
            data_type: int64
            description: "Foreign key linking the event to a specific record in the drivers_raw table."
            tests:
              - not_null
          
          - name: event_timestamp
            data_type: datetime
            description: "ISO 8601 timestamp (YYYY-MM-DDTHH:MM:SS) marking exactly when the status change occurred."
            tests:
              - not_null

      - name: drivers_raw
        description: "Raw driver data synced via Airbyte."
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: rating
            data_type: numeric
            description: "The driver's current lifetime average rating (e.g., 4.85) at the time of the last sync."
          
          - name: city_id
            data_type: int64
            description: "Raw foreign key indicating the primary operating city where the driver is registered."
            tests:
              - not_null
          
          - name: driver_id
            data_type: int64
            description: "The primary key for the driver in the source application database"
            tests:
              - unique
              - not_null
          
          - name: created_at
            data_type: datetime
            description: "ISO 8601 timestamp (YYYY-MM-DDTHH:MM:SS) when the driver record was first initialized."
            tests:
              - not_null
          
          - name: updated_at
            data_type: datetime
            description: "ISO 8601 timestamp of the most recent profile or status change in the source system."
          
          - name: vehicle_id
            data_type: string
            description: "Raw identifier for the default vehicle assigned to this driver record."
            tests:
              - not_null
          
          - name: driver_status
            data_type: string
            description: "The contract state of the driver (e.g., 'active', 'suspended', 'onboarding')."
            tests:
              - not_null
          
          - name: onboarding_date
            data_type: date
            description: "ISO 8601 date (YYYY-MM-DD) marking when the driver passed background checks and was activated."
            tests:
              - not_null

      - name: payments_raw
        description: "Raw payment data synced via Airbyte."
        config:
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 2, period: hour}
            filter: "_airbyte_extracted_at >= timestamp_sub(current_timestamp(), interval 1 day)"
          loaded_at_field: _airbyte_extracted_at
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: fee
            data_type: numeric
            description: "The processing fee withheld by the payment provider (e.g., Stripe)."
          
          - name: amount
            data_type: numeric
            description: "The gross transaction value charged to the rider."
            tests:
              - not_null
          
          - name: trip_id
            data_type: int64
            description: "Foreign key linking the payment to a specific record in the trips_raw table."
            tests:
              - not_null
          
          - name: currency
            data_type: string
            description: "The three-letter ISO currency code (e.g., 'GBP') used for the transaction."
            tests:
              - not_null
          
          - name: created_at
            data_type: datetime
            description: "ISO 8601 timestamp (YYYY-MM-DDTHH:MM:SS) when the payment record was first created."
            tests:
              - not_null
          
          - name: payment_id
            data_type: int64
            description: "The primary key for the transaction in the source payment system."
            tests:
              - unique
              - not_null
          
          - name: payment_status
            data_type: string
            description: "The raw state of the transaction (e.g., 'pending', 'succeeded', 'failed', 'refunded')."
            tests:
              - not_null
          
          - name: payment_provider
            data_type: string
            description: "The name of the third-party gateway that processed the payment (e.g., 'stripe', 'paypal')."
            tests:
              - not_null

      
      - name: riders_raw
        description: "Raw rider data synced via Airbyte."
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: country
            data_type: string
            description: "The raw country name provided by the rider during registration"
            tests:
              - not_null
          
          - name: rider_id
            data_type: int64
            description: "The unique primary key for the rider."
            tests:
              - unique
              - not_null
          
          - name: created_at
            data_type: datetime
            description: "ISO 8601 timestamp (YYYY-MM-DDTHH:MM:SS) indicating when the rider record was first inserted into the database."
            tests:
              - not_null
          
          - name: signup_date
            data_type: date
            description: "ISO 8601 date (YYYY-MM-DD) representing the official date the rider joined the platform."
            tests:
              - not_null
          
          - name: referral_code
            data_type: string
            description: "The alphanumeric code entered by the rider during signup to claim a promotion or attribute the lead."

      
      - name: trips_raw
        description: "Raw trip data synced via Airbyte."
        config:
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 2, period: hour}
            filter: "_airbyte_extracted_at >= timestamp_sub(current_timestamp(), interval 1 day)"
          loaded_at_field: _airbyte_extracted_at
        
        columns:
          - name: _airbyte_raw_id
            data_type: string
            description: " Airbyte generated record uniqued id"
          - name: _airbyte_extracted_at
            data_type: timestamp
            description: "Airbyte generated date column, to track latest ingestions"
          - name: _airbyte_meta
            data_type: json
            description: "Airbyte generated meta data"
          - name: _airbyte_generation_id
            data_type: int64
            description: "Airbyte generation id"
          
          - name: status
            data_type: string
            description: "The current state of the trip in the source system (e.g., 'completed', 'cancelled', 'active')."
            tests:
              - not_null
          
          - name: city_id
            data_type: int64
            description: "Raw foreign key for the city where the trip took place."
            tests:
              - not_null
          
          - name: trip_id
            data_type: int64
            description: "The primary key for the trip in the source database."
            tests:
              - unique
              - not_null
          
          - name: rider_id
            data_type: int64
            description: "Foreign key identifying the customer who requested the ride."
            tests:
              - not_null
          
          - name: driver_id
            data_type: int64
            description: "Foreign key identifying the driver assigned to the ride."
            tests:
              - not_null
          
          - name: pickup_at
            data_type: datetime
            description: "ISO 8601 timestamp (YYYY-MM-DDTHH:MM:SS) when the passenger was picked up."
            tests:
              - not_null
          
          - name: created_at
            data_type: datetime
            description: "ISO 8601 timestamp indicating when the trip record was first initialized."
            tests:
              - not_null
          
          - name: dropoff_at
            data_type: datetime
            description: "ISO 8601 timestamp of the trip completion."
            tests:
              - not_null
          
          - name: updated_at
            data_type: datetime
            description: "ISO 8601 timestamp of the last time this record was modified in the production system."
            tests:
              - not_null
          
          - name: vehicle_id
            data_type: string
            description: "Alphanumeric identifier for the vehicle used."
            tests:
              - not_null
          
          - name: actual_fare
            data_type: numeric
            description: "The final amount charged to the rider in local currency."
            tests:
              - not_null
          
          - name: is_corporate
            data_type: boolean
            description: "Boolean flag: true if the ride was billed to a corporate/business account."
            tests:
              - accepted_values:
                  values: [true, false]
                  quote: false
              - not_null
          
          - name: requested_at
            data_type: datetime
            description: "ISO 8601 timestamp of the exact moment the user submitted the ride request via the app."
            tests:
              - not_null
          
          - name: estimated_fare
            data_type: numeric
            description: "The upfront price quote shown to the rider at the time of request."
            tests:
              - not_null
          
          - name: payment_method
            data_type: string
            description: "The raw string indicating the payment type (e.g., 'credit_card', 'cash', 'mobile_wallet')."
            tests:
              - not_null
          
          - name: surge_multiplier
            data_type: numeric
            description: "The raw pricing multiplier applied during high-demand periods (e.g., 1.0, 1.5)."
            tests:
              - not_null

