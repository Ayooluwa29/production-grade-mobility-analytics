version: 2

models:
  - name: int_driver_lifetime_trips
    description: "Aggregates completed trips per driver to calculate total lifetime trip count. Used to enrich driver dimension with activity metrics."
    columns:
      - name: driver_id
        data_type: int64
        description: "Foreign key to stg_drivers. Unique identifier for the driver."

      - name: driver_lifetime_trips
        data_type: int64
        description: "Total number of completed trips the driver has taken since onboarding."

  - name: int_payments_enriched
    description: "Enriches payment records with net revenue calculation and duplicate payment detection. Serves as the canonical payments reference for downstream mart models."
    columns:
      - name: payment_id
        data_type: int64
        description: "Primary key. Unique identifier for the payment record."

      - name: trip_id
        data_type: int64
        description: "Foreign key to stg_trips. The trip this payment is associated with."

      - name: payment_status
        data_type: string
        description: "Current status of the payment. Expected values: success, failed, pending."

      - name: payment_provider
        data_type: string
        description: "The payment provider used to process the transaction (e.g. Stripe, PayPal)."

      - name: currency
        data_type: string
        description: "ISO 4217 currency code for the transaction (e.g. GBP)."

      - name: duplicate_payments
        data_type: boolean
        description: "True if more than one successful payment exists for the same trip_id, indicating a potential duplicate charge."

      - name: fee
        data_type: numeric
        description: "Platform or processing fee deducted from the gross payment amount."

      - name: amount
        data_type: int64
        description: "Gross payment amount charged to the rider in the smallest currency unit (e.g. pence)."

      - name: net_revenue
        data_type: numeric
        description: "Revenue retained after deducting the fee from the gross amount. Calculated as amount - fee."

      - name: created_at
        data_type: timestamp
        description: "Timestamp when the payment record was created. Stored in UTC."

  - name: int_fraud_indicators
    description: "Detects potential fraudulent activity by comparing the expected fare, actual fare charged, and amount paid by the rider. Flags records where discrepancies suggest fare manipulation or underpayment."
    columns:
      - name: payment_id
        data_type: int64
        description: "Foreign key to stg_payments. Unique identifier for the payment record."

      - name: trip_id
        data_type: int64
        description: "Foreign key to stg_trips. The trip associated with this fraud assessment."

      - name: driver_id
        data_type: int64
        description: "Foreign key to stg_drivers. The driver who completed the trip."

      - name: rider_id
        data_type: int64
        description: "Foreign key to stg_riders. The rider who took the trip."

      - name: expected_fare
        data_type: numeric
        description: "Calculated expected fare derived from estimated_fare multiplied by surge_multiplier."

      - name: actual_fare
        data_type: int64
        description: "The fare actually charged to the rider for the trip."

      - name: amount_paid
        data_type: int64
        description: "The amount actually paid by the rider via the payment provider."

      - name: fraud_detected
        data_type: boolean
        description: "True if expected_fare exceeds actual_fare, or actual_fare exceeds amount_paid. Indicates a potential fare discrepancy or underpayment."

  - name: int_rider_lifetime_value
    description: "Calculates the total net revenue generated by each rider across all their completed and successfully paid trips. Used to enrich the rider dimension with a key commercial metric."
    columns:
      - name: rider_id
        data_type: int64
        description: "Foreign key to stg_riders. Unique identifier for the rider."

      - name: rider_lifetime_value
        data_type: numeric
        description: "Sum of net revenue across all completed trips with a successful payment for this rider."

  - name: int_trips_enriched
    description: "Enriches trip records with derived business attributes including rider type classification, surge severity flag, and trip duration in minutes. Acts as the central enriched trip reference for the marts layer."
    columns:
      - name: trip_id
        data_type: int64
        description: "Primary key. Unique identifier for the trip."

      - name: city_id
        data_type: int64
        description: "Foreign key to stg_cities. The city in which the trip took place."

      - name: rider_id
        data_type: int64
        description: "Foreign key to stg_riders. The rider who requested the trip."

      - name: driver_id
        data_type: int64
        description: "Foreign key to stg_drivers. The driver who fulfilled the trip."

      - name: vehicle_id
        data_type: string
        description: "Identifier for the vehicle used to complete the trip."

      - name: status
        data_type: string
        description: "Current status of the trip. Expected values: completed, cancelled, in_progress."

      - name: is_corporate
        data_type: boolean
        description: "True if the trip was booked as part of a corporate account."

      - name: rider_type
        data_type: string
        description: "Derived classification of the rider based on is_corporate. Values: Corporate, Personal, Unknown."

      - name: payment_method
        data_type: string
        description: "Payment method selected by the rider for this trip (e.g. card, wallet, cash)."

      - name: actual_fare
        data_type: int64
        description: "The fare actually charged to the rider for the trip in the smallest currency unit."

      - name: estimated_fare
        data_type: int64
        description: "The fare estimated at the time of booking before surge or adjustments."

      - name: surge_multiplier
        data_type: numeric
        description: "The surge pricing multiplier applied to the trip at the time of booking."

      - name: surge_multiplier_flag
        data_type: string
        description: "Categorical flag for surge severity. Extreme if surge_multiplier > 10, Normal otherwise."

      - name: duration_minutes
        data_type: numeric
        description: "Total trip duration in minutes calculated from pickup_at to dropoff_at."

      - name: pickup_at
        data_type: timestamp
        description: "Timestamp when the driver picked up the rider. Stored in UTC."

      - name: created_at
        data_type: timestamp
        description: "Timestamp when the trip record was first created. Stored in UTC."

      - name: dropoff_at
        data_type: timestamp
        description: "Timestamp when the rider was dropped off at their destination. Stored in UTC."

      - name: updated_at
        data_type: timestamp
        description: "Timestamp of the most recent update to the trip record. Stored in UTC."

      - name: requested_at
        data_type: timestamp
        description: "Timestamp when the rider initially requested the trip. Stored in UTC."

